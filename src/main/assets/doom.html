<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <style>
        html, body {
          margin: 0; padding: 0;
          background: #000;
          overflow: hidden;
          width: 100%; height: 100%;
          font-family: monospace;
          color: #ff6633;
        }
        #jsdos {
          width: 100vw !important;
          height: 100vh !important;
          display: block;
          image-rendering: pixelated;
        }
        #status {
          position: fixed; top: 8px; left: 8px;
          z-index: 1000;
          font-size: 13px;
          text-shadow: 0 0 4px #000;
          pointer-events: none;
        }
        .dosbox-start, .dosbox-powered, .dosbox-overlay { display: none !important; }
    </style>
</head>
<body>
<div id="status">DOOM: starting...</div>
<canvas id="jsdos"></canvas>

<script>
    var statusEl = document.getElementById("status");
    function setStatus(m) { console.log("[doom] " + m); if (statusEl) statusEl.textContent = "DOOM: " + m; }
    function clearStatus() { if (statusEl) statusEl.style.display = "none"; }
    window.onerror = function (msg) { setStatus("ERROR: " + msg); };
    setStatus("loading engine...");
</script>

<!-- All paths are now relative — files come from the same assets folder -->
<script src="js-dos.js"
        onerror="setStatus('FAILED to load js-dos.js')"
        onload="setStatus('engine loaded, booting DOSBox...')"></script>

<script>
    if (typeof Dos === "function") {
      Dos(document.getElementById("jsdos"), {
        wdosboxUrl: "wdosbox.js",
        cycles: "auto",
        autolock: false
      }).ready(function (fs, main) {
        setStatus("loading WAD...");
        fs.extract("doom.zip")
          .then(function () {
            setStatus("starting DOOM...");
            return main([
              "-c", "config -set \"render frameskip=2\"",
              "-c", "cd DOOM",
              "-c", "DOOM.EXE"
            ]);
          })
          .then(function (ci) {
            window.ci = ci;
            setTimeout(clearStatus, 2500);
          })
          .catch(function (e) {
            setStatus("FAIL: " + (e && e.message ? e.message : JSON.stringify(e)));
          });
      });
    } else {
      setStatus("Dos() not defined");
    }

    function dispatchKey(keyCode, isDown) {
      if (window.ci) window.ci.simulateKeyEvent(keyCode, isDown);
    }
</script>
